<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BTB Boys Elite Drill Library</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--surface3:#282828;
--text:#f0f0f0;--text2:#a0a0a0;--border:#333;
--cyan:#00e5ff;--blue:#3b82f6;--orange:#ff9500;--green:#22c55e;
--red:#ef4444;--yellow:#eab308;--purple:#a855f7;--pink:#ec4899;
--white:#e5e7eb;--amber:#f59e0b;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;-webkit-tap-highlight-color:transparent}
.header{background:linear-gradient(135deg,#111 0%,#1a1a1a 100%);padding:20px 16px 12px;text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-size:1.4rem;font-weight:800;letter-spacing:1px;margin-bottom:2px}
.header h1 span{color:var(--cyan)}
.header .subtitle{font-size:.75rem;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.format-badge{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:.7rem;color:var(--text2);margin-bottom:12px}
.search-wrap{position:relative;max-width:500px;margin:0 auto}
.search-wrap input{width:100%;padding:12px 16px 12px 42px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--cyan)}
.search-wrap .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1.1rem;color:var(--text2)}
.drill-count{text-align:center;padding:10px 16px 0;font-size:.85rem;color:var(--text2);font-weight:600}
.drill-count span{color:var(--cyan)}

/* Category Buttons */
.categories{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:14px 16px;max-width:600px;margin:0 auto}
.cat-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 6px 10px;border-radius:16px;border:2px solid transparent;background:var(--surface);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;user-select:none;min-height:80px}
.cat-btn:active{transform:scale(.95)}
.cat-btn.active{border-color:var(--cat-color);background:color-mix(in srgb,var(--cat-color) 12%,var(--surface))}
.cat-btn .cat-emoji{font-size:1.8rem;margin-bottom:4px;line-height:1}
.cat-btn .cat-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);text-align:center;line-height:1.2}
.cat-btn.active .cat-label{color:var(--cat-color)}
.cat-btn-all{grid-column:1/-1}
.cat-btn-all .cat-emoji{font-size:1.4rem}

/* Drill Cards */
.drills-container{max-width:600px;margin:0 auto;padding:0 16px}
.drill-card{background:var(--surface);border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid var(--border);transition:border-color .2s}
.drill-card[data-expanded="true"]{border-color:var(--card-color,var(--border))}
.drill-header{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:12px;-webkit-tap-highlight-color:transparent;user-select:none}
.drill-number{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:#fff;flex-shrink:0}
.drill-info{flex:1;min-width:0}
.drill-name{font-size:.95rem;font-weight:700;margin-bottom:2px;line-height:1.3}
.drill-purpose{font-size:.75rem;color:var(--text2);line-height:1.3}
.drill-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.difficulty{display:flex;gap:3px}
.diff-dot{width:8px;height:8px;border-radius:50%;background:var(--surface3);border:1px solid var(--border)}
.diff-dot.filled{background:var(--card-color,#888);border-color:var(--card-color,#888)}
.view-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--card-color,#555);color:var(--card-color,#ccc);background:transparent;font-size:.7rem;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:all .2s}
.drill-card[data-expanded="true"] .view-btn{background:var(--card-color);color:#000;border-color:var(--card-color)}

/* Expanded Content */
.drill-detail{max-height:0;overflow:hidden;transition:max-height .4s ease}
.drill-card[data-expanded="true"] .drill-detail{max-height:2000px}
.drill-detail-inner{padding:0 16px 16px}
.detail-section{margin-bottom:14px}
.detail-section h4{font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--card-color,var(--text2));margin-bottom:6px;font-weight:700}
.detail-section p,.detail-section li{font-size:.85rem;color:var(--text2);line-height:1.5}
.detail-section ul{padding-left:18px}
.detail-section li{margin-bottom:4px}
.detail-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.detail-tag{padding:4px 10px;border-radius:6px;background:var(--surface3);font-size:.7rem;color:var(--text2);font-weight:600}

/* Video Links */
.video-links{display:flex;flex-direction:column;gap:8px}
.video-link{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);text-decoration:none;color:var(--text);transition:all .2s}
.video-link:hover,.video-link:active{border-color:var(--card-color,#555);background:var(--surface3)}
.video-play{width:36px;height:36px;border-radius:8px;background:color-mix(in srgb,var(--card-color,#555) 20%,transparent);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem}
.video-text{flex:1;min-width:0}
.video-title{font-size:.82rem;font-weight:600;line-height:1.3}
.video-channel{font-size:.68rem;color:var(--text2);margin-top:1px}
.video-arrow{color:var(--text2);font-size:.8rem}

/* SVG Diagrams */
.drill-diagram{width:100%;max-width:320px;margin:0 auto 10px;display:block}
.drill-diagram rect.field{fill:#1a3a1a;stroke:#2d5a2d;stroke-width:2;rx:8}
.drill-diagram circle.player{stroke-width:2}
.drill-diagram text{font-family:sans-serif;font-weight:700}
.drill-diagram line,.drill-diagram path.arrow{stroke-width:2;stroke-linecap:round}
.drill-diagram .label{font-size:10px;fill:var(--text2)}

/* Footer */
.footer{max-width:600px;margin:40px auto 0;padding:0 16px}
.footer h3{font-size:1rem;font-weight:700;margin-bottom:14px;text-align:center}
.resource-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.resource-link{display:flex;align-items:center;gap:8px;padding:12px;border-radius:10px;background:var(--surface);border:1px solid var(--border);text-decoration:none;color:var(--text);font-size:.78rem;font-weight:600;transition:all .2s}
.resource-link:hover{border-color:var(--cyan);background:var(--surface2)}
.resource-link .r-icon{font-size:1.2rem}
.back-link{display:block;text-align:center;padding:16px;color:var(--text2);font-size:.85rem;text-decoration:none;font-weight:600}
.back-link:hover{color:var(--text)}
.no-results{text-align:center;padding:40px 20px;color:var(--text2);font-size:1rem}
.no-results .nr-emoji{font-size:2rem;margin-bottom:8px}

@media(max-width:420px){
 .categories{grid-template-columns:repeat(5,1fr);gap:6px;padding:10px 10px}
 .cat-btn{padding:10px 4px 8px;min-height:70px;border-radius:12px}
 .cat-btn .cat-emoji{font-size:1.5rem}
 .cat-btn .cat-label{font-size:.5rem}
 .drills-container{padding:0 10px}
 .header{padding:16px 12px 10px}
}
@media(min-width:768px){
 .categories{grid-template-columns:repeat(5,1fr);max-width:700px;gap:12px}
 .drills-container{max-width:700px}
}
</style>
</head>

// ========== STATE ==========
let activeCategory = localStorage.getItem('btb_boys_drill_cat') || 'all';
let expandedDrill = null;
let searchQuery = '';

// ========== RENDER CATEGORIES ==========
function renderCategories() {
  const grid = document.getElementById('categoryGrid');
  let html = '';
  CATEGORIES.forEach(cat => {
    const isAll = cat.id === 'all';
    const isActive = activeCategory === cat.id;
    html += `<div class="cat-btn ${isAll ? 'cat-btn-all' : ''} ${isActive ? 'active' : ''}"
      style="--cat-color:${cat.color}"
      onclick="setCategory('${cat.id}')"
      data-cat="${cat.id}">
      <span class="cat-emoji">${cat.emoji}</span>
      <span class="cat-label">${cat.label}</span>
    </div>`;
  });
  grid.innerHTML = html;
}

// ========== RENDER DRILLS ==========
function getFilteredDrills() {
  let filtered = DRILLS;
  if (activeCategory !== 'all') {
    filtered = filtered.filter(d => d.cat === activeCategory);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(d => {
      const searchText = [d.name, d.purpose, d.cat, d.setup, ...(d.points || []),
        ...(d.videos || []).map(v => v.title + ' ' + v.channel)].join(' ').toLowerCase();
      return searchText.includes(q);
    });
  }
  return filtered;
}

function getCatColor(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  return cat ? cat.color : '#888';
}

function renderDrills() {
  const container = document.getElementById('drillsContainer');
  const filtered = getFilteredDrills();
  const countEl = document.getElementById('drillCount');
  countEl.innerHTML = `Showing <span>${filtered.length}</span> of 70 drills`;

  if (filtered.length === 0) {
    container.innerHTML = `<div class="no-results"><div class="nr-emoji">\u{1F50D}</div>No drills found. Try a different search or category.</div>`;
    return;
  }

  let html = '';
  filtered.forEach(drill => {
    const color = getCatColor(drill.cat);
    const isExpanded = expandedDrill === drill.id;
    const diffDots = Array.from({length: 3}, (_, i) =>
      `<div class="diff-dot ${i < drill.diff ? 'filled' : ''}" style="--card-color:${color}"></div>`
    ).join('');

    let detailHtml = '';
    if (isExpanded) {
      detailHtml = `<div class="drill-detail-inner">
        <div class="detail-tags">
          <div class="detail-tag">\u{1F464} ${drill.players} players</div>
          <div class="detail-tag">\u{23F1} ${drill.time}</div>
          <div class="detail-tag">${drill.diff === 1 ? 'Beginner' : drill.diff === 2 ? 'Intermediate' : 'Advanced'}</div>
        </div>
        ${drill.diagram ? `<div class="detail-section">${getDiagram(drill.diagram, color)}</div>` : ''}
        <div class="detail-section">
          <h4>Setup</h4>
          <p>${drill.setup}</p>
        </div>
        <div class="detail-section">
          <h4>Coaching Points</h4>
          <ul>${drill.points.map(p => `<li>${p}</li>`).join('')}</ul>
        </div>
        ${drill.videos && drill.videos.length > 0 ? `
        <div class="detail-section">
          <h4>\u{1F3AC} Watch & Learn</h4>
          <div class="video-links">
            ${drill.videos.map(v => `
              <a href="${v.url}" target="_blank" rel="noopener" class="video-link" style="--card-color:${color}">
                <div class="video-play" style="--card-color:${color}">\u{25B6}</div>
                <div class="video-text">
                  <div class="video-title">${v.title}</div>
                  <div class="video-channel">${v.channel}</div>
                </div>
                <div class="video-arrow">\u{2197}</div>
              </a>
            `).join('')}
          </div>
        </div>` : ''}
      </div>`;
    }

    html += `<div class="drill-card" data-expanded="${isExpanded}" style="--card-color:${color}">
      <div class="drill-header" onclick="toggleDrill(${drill.id})">
        <div class="drill-number" style="background:${color}">${drill.id}</div>
        <div class="drill-info">
          <div class="drill-name">${drill.name}</div>
          <div class="drill-purpose">${drill.purpose}</div>
        </div>
        <div class="drill-meta">
          <div class="difficulty" style="--card-color:${color}">${diffDots}</div>
          <button class="view-btn" style="--card-color:${color}">${isExpanded ? 'Close' : 'View'}</button>
        </div>
      </div>
      <div class="drill-detail">${detailHtml}</div>
    </div>`;
  });
  container.innerHTML = html;
}

// ========== ACTIONS ==========
function setCategory(catId) {
  activeCategory = catId;
  expandedDrill = null;
  localStorage.setItem('btb_boys_drill_cat', catId);
  renderCategories();
  renderDrills();
  document.getElementById('drillsContainer').scrollIntoView({behavior:'smooth', block:'start'});
}

function toggleDrill(id) {
  expandedDrill = expandedDrill === id ? null : id;
  renderDrills();
  if (expandedDrill) {
    setTimeout(() => {
      const card = document.querySelector(`.drill-card[data-expanded="true"]`);
      if (card) card.scrollIntoView({behavior:'smooth', block:'nearest'});
    }, 50);
  }
}

// ========== SEARCH ==========
document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value.trim();
  expandedDrill = null;
  renderDrills();
});

// ========== INIT ==========
renderCategories();
renderDrills();
</script>
</body>
</html>
